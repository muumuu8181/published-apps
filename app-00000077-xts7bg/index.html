<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音響合成ウェーブフォームエディター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            to { text-shadow: 0 0 30px rgba(255, 255, 255, 0.8), 0 0 40px rgba(102, 126, 234, 0.6); }
        }

        .subtitle {
            color: #b8b8b8;
            font-size: 1.1em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-panel, .preset-panel {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
        }

        .visualization-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            min-height: 600px;
            position: relative;
        }

        .section-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #e0e0e0;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
            padding-bottom: 5px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e0e0e0;
            font-size: 0.9em;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .slider-value {
            min-width: 60px;
            text-align: center;
            font-size: 0.8em;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        option {
            background: #333;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .play-btn {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }

        .stop-btn {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 12px;
            padding: 8px;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .active {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
        }

        #waveformCanvas, #spectrumCanvas {
            width: 100%;
            height: 200px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .oscillator-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .layer-control {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .layer-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 10px;
        }

        .layer-title {
            font-size: 0.9em;
            font-weight: 600;
        }

        .layer-toggle {
            width: 50px;
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .layer-toggle.active {
            background: linear-gradient(135deg, #4caf50, #45a049);
        }

        .layer-toggle::after {
            content: '';
            position: absolute;
            width: 21px;
            height: 21px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }

        .layer-toggle.active::after {
            left: 27px;
        }

        .envelope-visual {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }

        .filter-response {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin: 10px 0;
        }

        .export-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .waveform-type-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }

        .wave-btn {
            padding: 8px 4px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wave-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .spectrum-analyzer {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .frequency-display {
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            color: #4caf50;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .oscillator-controls {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .waveform-type-selector {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>音響合成ウェーブフォームエディター</h1>
            <p class="subtitle">複数レイヤー・エンベロープ・フィルターによる高品質音響合成</p>
        </header>

        <div class="main-grid">
            <!-- コントロールパネル -->
            <div class="control-panel">
                <div class="section-title">マスターコントロール</div>
                
                <div class="control-group">
                    <label>マスターボリューム</label>
                    <div class="slider-container">
                        <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.3" oninput="updateMasterVolume()">
                        <span class="slider-value" id="masterVolumeValue">0.3</span>
                    </div>
                </div>

                <div class="control-group">
                    <button class="play-btn" id="playBtn" onclick="togglePlayback()">▶ PLAY</button>
                    <button class="stop-btn" onclick="stopAll()">⏹ STOP</button>
                </div>

                <div class="section-title">オシレーター1</div>
                <div class="layer-control">
                    <div class="layer-header">
                        <span class="layer-title">OSC1</span>
                        <div class="layer-toggle active" id="osc1Toggle" onclick="toggleLayer(1)"></div>
                    </div>
                    
                    <div class="waveform-type-selector">
                        <button class="wave-btn active" data-layer="1" data-type="sine" onclick="setWaveform(1, 'sine')">SIN</button>
                        <button class="wave-btn" data-layer="1" data-type="square" onclick="setWaveform(1, 'square')">SQR</button>
                        <button class="wave-btn" data-layer="1" data-type="sawtooth" onclick="setWaveform(1, 'sawtooth')">SAW</button>
                        <button class="wave-btn" data-layer="1" data-type="triangle" onclick="setWaveform(1, 'triangle')">TRI</button>
                    </div>

                    <label>周波数</label>
                    <div class="slider-container">
                        <input type="range" id="freq1" min="20" max="2000" value="440" oninput="updateFrequency(1)">
                        <span class="slider-value" id="freq1Value">440Hz</span>
                    </div>

                    <label>ボリューム</label>
                    <div class="slider-container">
                        <input type="range" id="vol1" min="0" max="1" step="0.01" value="0.8" oninput="updateVolume(1)">
                        <span class="slider-value" id="vol1Value">0.8</span>
                    </div>

                    <label>デチューン</label>
                    <div class="slider-container">
                        <input type="range" id="detune1" min="-100" max="100" value="0" oninput="updateDetune(1)">
                        <span class="slider-value" id="detune1Value">0¢</span>
                    </div>
                </div>

                <div class="section-title">オシレーター2</div>
                <div class="layer-control">
                    <div class="layer-header">
                        <span class="layer-title">OSC2</span>
                        <div class="layer-toggle" id="osc2Toggle" onclick="toggleLayer(2)"></div>
                    </div>
                    
                    <div class="waveform-type-selector">
                        <button class="wave-btn" data-layer="2" data-type="sine" onclick="setWaveform(2, 'sine')">SIN</button>
                        <button class="wave-btn active" data-layer="2" data-type="square" onclick="setWaveform(2, 'square')">SQR</button>
                        <button class="wave-btn" data-layer="2" data-type="sawtooth" onclick="setWaveform(2, 'sawtooth')">SAW</button>
                        <button class="wave-btn" data-layer="2" data-type="triangle" onclick="setWaveform(2, 'triangle')">TRI</button>
                    </div>

                    <label>周波数</label>
                    <div class="slider-container">
                        <input type="range" id="freq2" min="20" max="2000" value="880" oninput="updateFrequency(2)">
                        <span class="slider-value" id="freq2Value">880Hz</span>
                    </div>

                    <label>ボリューム</label>
                    <div class="slider-container">
                        <input type="range" id="vol2" min="0" max="1" step="0.01" value="0.0" oninput="updateVolume(2)">
                        <span class="slider-value" id="vol2Value">0.0</span>
                    </div>

                    <label>デチューン</label>
                    <div class="slider-container">
                        <input type="range" id="detune2" min="-100" max="100" value="0" oninput="updateDetune(2)">
                        <span class="slider-value" id="detune2Value">0¢</span>
                    </div>
                </div>
            </div>

            <!-- 可視化エリア -->
            <div class="visualization-area">
                <div class="section-title">波形ビジュアライザー</div>
                <canvas id="waveformCanvas"></canvas>
                
                <div class="section-title">スペクトラムアナライザー</div>
                <div class="spectrum-analyzer">
                    <canvas id="spectrumCanvas"></canvas>
                    <div class="frequency-display" id="frequencyDisplay">
                        基音: 440Hz | 高調波: 2nd(880Hz), 3rd(1320Hz)
                    </div>
                </div>

                <div class="export-section">
                    <h3>エクスポート</h3>
                    <p>生成した音をWAV形式で保存</p>
                    <button class="preset-btn" onclick="exportWAV()">WAVエクスポート</button>
                </div>
            </div>

            <!-- プリセット・エンベロープパネル -->
            <div class="preset-panel">
                <div class="section-title">エンベロープ (ADSR)</div>
                
                <label>Attack (アタック)</label>
                <div class="slider-container">
                    <input type="range" id="attack" min="0" max="2" step="0.01" value="0.1" oninput="updateEnvelope()">
                    <span class="slider-value" id="attackValue">0.1s</span>
                </div>

                <label>Decay (ディケイ)</label>
                <div class="slider-container">
                    <input type="range" id="decay" min="0" max="2" step="0.01" value="0.3" oninput="updateEnvelope()">
                    <span class="slider-value" id="decayValue">0.3s</span>
                </div>

                <label>Sustain (サスティン)</label>
                <div class="slider-container">
                    <input type="range" id="sustain" min="0" max="1" step="0.01" value="0.5" oninput="updateEnvelope()">
                    <span class="slider-value" id="sustainValue">0.5</span>
                </div>

                <label>Release (リリース)</label>
                <div class="slider-container">
                    <input type="range" id="release" min="0" max="3" step="0.01" value="0.8" oninput="updateEnvelope()">
                    <span class="slider-value" id="releaseValue">0.8s</span>
                </div>

                <canvas class="envelope-visual" id="envelopeCanvas"></canvas>

                <div class="section-title">フィルター</div>
                
                <label>フィルタータイプ</label>
                <select id="filterType" onchange="updateFilter()">
                    <option value="lowpass">ローパスフィルター</option>
                    <option value="highpass">ハイパスフィルター</option>
                    <option value="bandpass">バンドパスフィルター</option>
                    <option value="notch">ノッチフィルター</option>
                </select>

                <label>カットオフ周波数</label>
                <div class="slider-container">
                    <input type="range" id="cutoff" min="100" max="10000" value="1000" oninput="updateFilter()">
                    <span class="slider-value" id="cutoffValue">1000Hz</span>
                </div>

                <label>Q値 (レゾナンス)</label>
                <div class="slider-container">
                    <input type="range" id="resonance" min="0.1" max="30" step="0.1" value="1" oninput="updateFilter()">
                    <span class="slider-value" id="resonanceValue">1.0</span>
                </div>

                <canvas class="filter-response" id="filterCanvas"></canvas>

                <div class="section-title">プリセット</div>
                <button class="preset-btn" onclick="loadPreset('bass')">🎵 ベース</button>
                <button class="preset-btn" onclick="loadPreset('lead')">🎸 リード</button>
                <button class="preset-btn" onclick="loadPreset('pad')">🌊 パッド</button>
                <button class="preset-btn" onclick="loadPreset('pluck')">🎹 プラック</button>
                <button class="preset-btn" onclick="loadPreset('organ')">🎹 オルガン</button>
                <button class="preset-btn" onclick="loadPreset('noise')">⚡ ノイズ</button>
            </div>
        </div>
    </div>

    <script>
        // Web Audio API
        let audioContext;
        let oscillators = [];
        let gainNodes = [];
        let masterGain;
        let analyser;
        let filter;
        let dataArray;
        let isPlaying = false;

        // 波形描画
        let waveformCanvas, waveformCtx;
        let spectrumCanvas, spectrumCtx;
        let envelopeCanvas, envelopeCtx;
        let filterCanvas, filterCtx;

        // パラメータ
        let synthParams = {
            masterVolume: 0.3,
            oscillators: [
                { enabled: true, type: 'sine', freq: 440, volume: 0.8, detune: 0 },
                { enabled: false, type: 'square', freq: 880, volume: 0.0, detune: 0 }
            ],
            envelope: { attack: 0.1, decay: 0.3, sustain: 0.5, release: 0.8 },
            filter: { type: 'lowpass', cutoff: 1000, resonance: 1 }
        };

        // 初期化
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // マスターゲイン
            masterGain = audioContext.createGain();
            masterGain.gain.value = synthParams.masterVolume;
            
            // フィルター
            filter = audioContext.createBiquadFilter();
            filter.type = synthParams.filter.type;
            filter.frequency.value = synthParams.filter.cutoff;
            filter.Q.value = synthParams.filter.resonance;
            
            // アナライザー
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            // 接続
            masterGain.connect(filter);
            filter.connect(analyser);
            analyser.connect(audioContext.destination);
            
            initCanvases();
            startVisualization();
        }

        function initCanvases() {
            waveformCanvas = document.getElementById('waveformCanvas');
            waveformCtx = waveformCanvas.getContext('2d');
            waveformCanvas.width = waveformCanvas.offsetWidth;
            waveformCanvas.height = 200;
            
            spectrumCanvas = document.getElementById('spectrumCanvas');
            spectrumCtx = spectrumCanvas.getContext('2d');
            spectrumCanvas.width = spectrumCanvas.offsetWidth;
            spectrumCanvas.height = 150;
            
            envelopeCanvas = document.getElementById('envelopeCanvas');
            envelopeCtx = envelopeCanvas.getContext('2d');
            envelopeCanvas.width = envelopeCanvas.offsetWidth;
            envelopeCanvas.height = 80;
            
            filterCanvas = document.getElementById('filterCanvas');
            filterCtx = filterCanvas.getContext('2d');
            filterCanvas.width = filterCanvas.offsetWidth;
            filterCanvas.height = 100;
            
            drawEnvelope();
            drawFilterResponse();
        }

        // 再生制御
        async function togglePlayback() {
            if (!audioContext) {
                await initAudio();
            }
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            if (isPlaying) {
                stopAll();
            } else {
                startPlayback();
            }
        }

        function startPlayback() {
            stopAll(); // 既存の音を停止
            
            oscillators = [];
            gainNodes = [];
            
            synthParams.oscillators.forEach((osc, index) => {
                if (osc.enabled && osc.volume > 0) {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.type = osc.type;
                    oscillator.frequency.value = osc.freq;
                    oscillator.detune.value = osc.detune;
                    
                    // エンベロープ適用
                    const now = audioContext.currentTime;
                    const { attack, decay, sustain, release } = synthParams.envelope;
                    
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(osc.volume, now + attack);
                    gainNode.gain.linearRampToValueAtTime(osc.volume * sustain, now + attack + decay);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(masterGain);
                    
                    oscillator.start(now);
                    oscillator.stop(now + attack + decay + 2); // サスティン時間
                    
                    oscillators.push(oscillator);
                    gainNodes.push(gainNode);
                }
            });
            
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸ PAUSE';
            
            // 自動停止
            setTimeout(() => {
                if (isPlaying) {
                    stopAll();
                }
            }, (synthParams.envelope.attack + synthParams.envelope.decay + 2 + synthParams.envelope.release) * 1000);
        }

        function stopAll() {
            oscillators.forEach(osc => {
                if (osc.stop) {
                    osc.stop();
                }
            });
            oscillators = [];
            gainNodes = [];
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ PLAY';
        }

        // パラメータ更新
        function updateMasterVolume() {
            const value = document.getElementById('masterVolume').value;
            synthParams.masterVolume = parseFloat(value);
            document.getElementById('masterVolumeValue').textContent = value;
            if (masterGain) {
                masterGain.gain.value = synthParams.masterVolume;
            }
        }

        function updateFrequency(layer) {
            const value = document.getElementById(`freq${layer}`).value;
            synthParams.oscillators[layer - 1].freq = parseFloat(value);
            document.getElementById(`freq${layer}Value`).textContent = value + 'Hz';
        }

        function updateVolume(layer) {
            const value = document.getElementById(`vol${layer}`).value;
            synthParams.oscillators[layer - 1].volume = parseFloat(value);
            document.getElementById(`vol${layer}Value`).textContent = value;
        }

        function updateDetune(layer) {
            const value = document.getElementById(`detune${layer}`).value;
            synthParams.oscillators[layer - 1].detune = parseFloat(value);
            document.getElementById(`detune${layer}Value`).textContent = value + '¢';
        }

        function setWaveform(layer, type) {
            synthParams.oscillators[layer - 1].type = type;
            
            // UI更新
            document.querySelectorAll(`[data-layer="${layer}"]`).forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-layer="${layer}"][data-type="${type}"]`).classList.add('active');
        }

        function toggleLayer(layer) {
            const toggle = document.getElementById(`osc${layer}Toggle`);
            const enabled = !synthParams.oscillators[layer - 1].enabled;
            synthParams.oscillators[layer - 1].enabled = enabled;
            toggle.classList.toggle('active', enabled);
        }

        function updateEnvelope() {
            synthParams.envelope.attack = parseFloat(document.getElementById('attack').value);
            synthParams.envelope.decay = parseFloat(document.getElementById('decay').value);
            synthParams.envelope.sustain = parseFloat(document.getElementById('sustain').value);
            synthParams.envelope.release = parseFloat(document.getElementById('release').value);
            
            document.getElementById('attackValue').textContent = synthParams.envelope.attack + 's';
            document.getElementById('decayValue').textContent = synthParams.envelope.decay + 's';
            document.getElementById('sustainValue').textContent = synthParams.envelope.sustain;
            document.getElementById('releaseValue').textContent = synthParams.envelope.release + 's';
            
            drawEnvelope();
        }

        function updateFilter() {
            synthParams.filter.type = document.getElementById('filterType').value;
            synthParams.filter.cutoff = parseFloat(document.getElementById('cutoff').value);
            synthParams.filter.resonance = parseFloat(document.getElementById('resonance').value);
            
            document.getElementById('cutoffValue').textContent = synthParams.filter.cutoff + 'Hz';
            document.getElementById('resonanceValue').textContent = synthParams.filter.resonance;
            
            if (filter) {
                filter.type = synthParams.filter.type;
                filter.frequency.value = synthParams.filter.cutoff;
                filter.Q.value = synthParams.filter.resonance;
            }
            
            drawFilterResponse();
        }

        // 可視化
        function startVisualization() {
            function animate() {
                requestAnimationFrame(animate);
                
                if (analyser && isPlaying) {
                    drawWaveform();
                    drawSpectrum();
                    updateFrequencyDisplay();
                }
            }
            animate();
        }

        function drawWaveform() {
            const bufferLength = analyser.fftSize;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);
            
            waveformCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            waveformCtx.fillRect(0, 0, waveformCanvas.width, waveformCanvas.height);
            
            waveformCtx.lineWidth = 2;
            waveformCtx.strokeStyle = '#4caf50';
            waveformCtx.beginPath();
            
            const sliceWidth = waveformCanvas.width / bufferLength;
            let x = 0;
            
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * waveformCanvas.height / 2;
                
                if (i === 0) {
                    waveformCtx.moveTo(x, y);
                } else {
                    waveformCtx.lineTo(x, y);
                }
                
                x += sliceWidth;
            }
            
            waveformCtx.stroke();
        }

        function drawSpectrum() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            spectrumCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            spectrumCtx.fillRect(0, 0, spectrumCanvas.width, spectrumCanvas.height);
            
            const barWidth = spectrumCanvas.width / bufferLength * 4;
            let x = 0;
            
            for (let i = 0; i < bufferLength / 4; i++) {
                const barHeight = (dataArray[i] / 255) * spectrumCanvas.height;
                
                const hue = (i / (bufferLength / 4)) * 360;
                spectrumCtx.fillStyle = `hsla(${hue}, 70%, 50%, 0.8)`;
                
                spectrumCtx.fillRect(x, spectrumCanvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        function drawEnvelope() {
            const { attack, decay, sustain, release } = synthParams.envelope;
            const totalTime = attack + decay + 1 + release; // 1秒のサスティン
            
            envelopeCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            envelopeCtx.fillRect(0, 0, envelopeCanvas.width, envelopeCanvas.height);
            
            envelopeCtx.strokeStyle = '#667eea';
            envelopeCtx.lineWidth = 2;
            envelopeCtx.beginPath();
            
            const width = envelopeCanvas.width;
            const height = envelopeCanvas.height;
            
            // Attack
            const attackX = (attack / totalTime) * width;
            envelopeCtx.moveTo(0, height);
            envelopeCtx.lineTo(attackX, 0);
            
            // Decay  
            const decayX = attackX + (decay / totalTime) * width;
            envelopeCtx.lineTo(decayX, height * (1 - sustain));
            
            // Sustain
            const sustainX = decayX + (1 / totalTime) * width;
            envelopeCtx.lineTo(sustainX, height * (1 - sustain));
            
            // Release
            const releaseX = sustainX + (release / totalTime) * width;
            envelopeCtx.lineTo(releaseX, height);
            
            envelopeCtx.stroke();
        }

        function drawFilterResponse() {
            filterCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            filterCtx.fillRect(0, 0, filterCanvas.width, filterCanvas.height);
            
            filterCtx.strokeStyle = '#f44336';
            filterCtx.lineWidth = 2;
            filterCtx.beginPath();
            
            const { type, cutoff, resonance } = synthParams.filter;
            
            for (let x = 0; x < filterCanvas.width; x++) {
                const freq = (x / filterCanvas.width) * 10000; // 0-10kHz
                let response = 1;
                
                switch (type) {
                    case 'lowpass':
                        response = 1 / Math.sqrt(1 + Math.pow(freq / cutoff, 2 * resonance));
                        break;
                    case 'highpass':
                        response = Math.sqrt(Math.pow(freq / cutoff, 2 * resonance) / (1 + Math.pow(freq / cutoff, 2 * resonance)));
                        break;
                    case 'bandpass':
                        const bandwidth = cutoff / resonance;
                        response = Math.exp(-Math.pow((freq - cutoff) / bandwidth, 2));
                        break;
                    case 'notch':
                        const notchBandwidth = cutoff / resonance;
                        response = 1 - Math.exp(-Math.pow((freq - cutoff) / notchBandwidth, 2));
                        break;
                }
                
                const y = filterCanvas.height * (1 - response);
                
                if (x === 0) {
                    filterCtx.moveTo(x, y);
                } else {
                    filterCtx.lineTo(x, y);
                }
            }
            
            filterCtx.stroke();
        }

        function updateFrequencyDisplay() {
            const osc1 = synthParams.oscillators[0];
            const osc2 = synthParams.oscillators[1];
            
            let display = `基音: ${osc1.freq}Hz`;
            
            if (osc2.enabled && osc2.volume > 0) {
                display += ` + ${osc2.freq}Hz`;
            }
            
            // 高調波表示
            const harmonics = [];
            for (let i = 2; i <= 4; i++) {
                harmonics.push(`${i}nd(${osc1.freq * i}Hz)`);
            }
            display += ` | 高調波: ${harmonics.join(', ')}`;
            
            document.getElementById('frequencyDisplay').textContent = display;
        }

        // プリセット
        function loadPreset(name) {
            const presets = {
                bass: {
                    oscillators: [
                        { enabled: true, type: 'sawtooth', freq: 80, volume: 0.9, detune: 0 },
                        { enabled: true, type: 'square', freq: 80, volume: 0.3, detune: -12 }
                    ],
                    envelope: { attack: 0.01, decay: 0.1, sustain: 0.8, release: 0.5 },
                    filter: { type: 'lowpass', cutoff: 500, resonance: 3 }
                },
                lead: {
                    oscillators: [
                        { enabled: true, type: 'sawtooth', freq: 440, volume: 0.7, detune: 0 },
                        { enabled: true, type: 'square', freq: 440, volume: 0.4, detune: 7 }
                    ],
                    envelope: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.8 },
                    filter: { type: 'lowpass', cutoff: 2000, resonance: 5 }
                },
                pad: {
                    oscillators: [
                        { enabled: true, type: 'sine', freq: 220, volume: 0.5, detune: 0 },
                        { enabled: true, type: 'sine', freq: 330, volume: 0.4, detune: 5 }
                    ],
                    envelope: { attack: 1.0, decay: 0.5, sustain: 0.7, release: 2.0 },
                    filter: { type: 'lowpass', cutoff: 1500, resonance: 1 }
                },
                pluck: {
                    oscillators: [
                        { enabled: true, type: 'triangle', freq: 440, volume: 0.8, detune: 0 },
                        { enabled: false, type: 'sine', freq: 880, volume: 0.0, detune: 0 }
                    ],
                    envelope: { attack: 0.01, decay: 0.8, sustain: 0.1, release: 0.3 },
                    filter: { type: 'lowpass', cutoff: 3000, resonance: 2 }
                },
                organ: {
                    oscillators: [
                        { enabled: true, type: 'sine', freq: 440, volume: 0.6, detune: 0 },
                        { enabled: true, type: 'sine', freq: 880, volume: 0.4, detune: 0 }
                    ],
                    envelope: { attack: 0.1, decay: 0.0, sustain: 1.0, release: 0.5 },
                    filter: { type: 'lowpass', cutoff: 5000, resonance: 1 }
                },
                noise: {
                    oscillators: [
                        { enabled: true, type: 'square', freq: 100, volume: 0.8, detune: 0 },
                        { enabled: true, type: 'sawtooth', freq: 200, volume: 0.6, detune: 50 }
                    ],
                    envelope: { attack: 0.0, decay: 0.1, sustain: 0.3, release: 0.2 },
                    filter: { type: 'highpass', cutoff: 800, resonance: 10 }
                }
            };
            
            if (presets[name]) {
                synthParams = { ...synthParams, ...presets[name] };
                updateUI();
            }
        }

        function updateUI() {
            // オシレーター
            synthParams.oscillators.forEach((osc, index) => {
                const layer = index + 1;
                document.getElementById(`freq${layer}`).value = osc.freq;
                document.getElementById(`vol${layer}`).value = osc.volume;
                document.getElementById(`detune${layer}`).value = osc.detune;
                
                document.getElementById(`freq${layer}Value`).textContent = osc.freq + 'Hz';
                document.getElementById(`vol${layer}Value`).textContent = osc.volume;
                document.getElementById(`detune${layer}Value`).textContent = osc.detune + '¢';
                
                document.getElementById(`osc${layer}Toggle`).classList.toggle('active', osc.enabled);
                
                // 波形タイプ
                document.querySelectorAll(`[data-layer="${layer}"]`).forEach(btn => {
                    btn.classList.remove('active');
                });
                document.querySelector(`[data-layer="${layer}"][data-type="${osc.type}"]`).classList.add('active');
            });
            
            // エンベロープ
            document.getElementById('attack').value = synthParams.envelope.attack;
            document.getElementById('decay').value = synthParams.envelope.decay;
            document.getElementById('sustain').value = synthParams.envelope.sustain;
            document.getElementById('release').value = synthParams.envelope.release;
            updateEnvelope();
            
            // フィルター
            document.getElementById('filterType').value = synthParams.filter.type;
            document.getElementById('cutoff').value = synthParams.filter.cutoff;
            document.getElementById('resonance').value = synthParams.filter.resonance;
            updateFilter();
        }

        // WAVエクスポート
        function exportWAV() {
            if (!audioContext) {
                alert('まず音を再生してからエクスポートしてください。');
                return;
            }
            
            // オフラインレンダリング
            const duration = synthParams.envelope.attack + synthParams.envelope.decay + 2 + synthParams.envelope.release;
            const offlineContext = new OfflineAudioContext(1, audioContext.sampleRate * duration, audioContext.sampleRate);
            
            // 同じ設定で音声を生成
            const offlineMasterGain = offlineContext.createGain();
            offlineMasterGain.gain.value = synthParams.masterVolume;
            offlineMasterGain.connect(offlineContext.destination);
            
            synthParams.oscillators.forEach((osc, index) => {
                if (osc.enabled && osc.volume > 0) {
                    const oscillator = offlineContext.createOscillator();
                    const gainNode = offlineContext.createGain();
                    
                    oscillator.type = osc.type;
                    oscillator.frequency.value = osc.freq;
                    oscillator.detune.value = osc.detune;
                    
                    // エンベロープ
                    const { attack, decay, sustain, release } = synthParams.envelope;
                    gainNode.gain.setValueAtTime(0, 0);
                    gainNode.gain.linearRampToValueAtTime(osc.volume, attack);
                    gainNode.gain.linearRampToValueAtTime(osc.volume * sustain, attack + decay);
                    gainNode.gain.linearRampToValueAtTime(0, attack + decay + 2 + release);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(offlineMasterGain);
                    
                    oscillator.start(0);
                    oscillator.stop(duration);
                }
            });
            
            offlineContext.startRendering().then(renderedBuffer => {
                const wav = audioBufferToWav(renderedBuffer);
                const blob = new Blob([wav], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `synthesized_sound_${Date.now()}.wav`;
                a.click();
                
                URL.revokeObjectURL(url);
            });
        }

        function audioBufferToWav(buffer) {
            const length = buffer.length;
            const arrayBuffer = new ArrayBuffer(44 + length * 2);
            const view = new DataView(arrayBuffer);
            
            // WAVヘッダー
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, buffer.sampleRate, true);
            view.setUint32(28, buffer.sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, length * 2, true);
            
            const channelData = buffer.getChannelData(0);
            let offset = 44;
            for (let i = 0; i < length; i++) {
                const sample = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(offset, sample * 0x7FFF, true);
                offset += 2;
            }
            
            return arrayBuffer;
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            updateEnvelope();
            drawFilterResponse();
        });
    </script>
